apiVersion: v1
kind: Service
metadata:
  name: stock-radar-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app: stock-radar-frontend
    app.kubernetes.io/part-of: stock-radar-system
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.containerPort }}
      protocol: TCP
      name: http
  selector:
    app: stock-radar-frontend
