{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-radar-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: stock-radar-api
    app.kubernetes.io/part-of: stock-radar-system
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: stock-radar-api
                port:
                  number: 8000
          {{- end }}
    {{- end }}
{{- end }}
