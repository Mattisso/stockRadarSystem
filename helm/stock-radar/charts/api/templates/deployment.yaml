apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-radar-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: stock-radar-api
    app.kubernetes.io/part-of: stock-radar-system
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: stock-radar-api
  template:
    metadata:
      labels:
        app: stock-radar-api
    spec:
      serviceAccountName: {{ .Values.global.sharedServiceAccountName }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          env:
            - name: API_PORT
              value: {{ .Values.env.API_PORT | quote }}
            - name: PGHOST
              value: {{ .Values.env.PGHOST | quote }}
            - name: PGPORT
              value: {{ .Values.env.PGPORT | quote }}
            - name: PGDATABASE
              value: {{ .Values.env.PGDATABASE | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: {{ .Values.env.PGUSER_SECRET_KEY }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: {{ .Values.env.PGPASSWORD_SECRET_KEY }}
            - name: DATABASE_URL
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Values.env.PGHOST }}:{{ .Values.env.PGPORT }}/{{ .Values.env.PGDATABASE }}"
            - name: TRADING_MODE
              value: {{ .Values.env.TRADING_MODE | quote }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
