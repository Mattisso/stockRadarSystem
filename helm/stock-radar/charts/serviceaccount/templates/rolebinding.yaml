apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.global.sharedServiceAccountName }}-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: stock-radar-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.global.sharedServiceAccountName }}-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.global.sharedServiceAccountName }}
    namespace: {{ .Release.Namespace }}
