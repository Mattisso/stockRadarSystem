apiVersion: batch/v1
kind: Job
metadata:
  name: check-postgres-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
  labels:
    {{- include "stock-radar.labels" . | nindent 4 }}
spec:
  template:
    spec:
      serviceAccountName: {{ .Values.global.sharedServiceAccountName }}
      restartPolicy: Never
      containers:
        - name: check-secret
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Checking for secret '{{ .Values.secretName }}' in namespace '{{ .Release.Namespace }}'..."
              if kubectl get secret {{ .Values.secretName }} -n {{ .Release.Namespace }} > /dev/null 2>&1; then
                echo "Secret '{{ .Values.secretName }}' found."
                exit 0
              else
                echo "ERROR: Secret '{{ .Values.secretName }}' not found."
                echo "Create it with:"
                echo "  kubectl create secret generic {{ .Values.secretName }} \\"
                echo "    --from-literal=PGUSER=postgres \\"
                echo "    --from-literal=PGPASSWORD=<password> \\"
                echo "    --namespace={{ .Release.Namespace }}"
                exit 1
              fi
  backoffLimit: 0
