<mat-card>
  <mat-card-header>
    <mat-card-title>System Status</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="status-row">
      <span>API Health</span>
      <app-status-badge
        [label]="healthy() ? 'Healthy' : 'Down'"
        [color]="healthy() ? 'green' : 'red'"
      />
    </div>
    @if (lastUpdated()) {
      <div class="status-row">
        <span>Last Updated</span>
        <span class="timestamp">{{ lastUpdated() | date:'medium' }}</span>
      </div>
    }
  </mat-card-content>
</mat-card>
