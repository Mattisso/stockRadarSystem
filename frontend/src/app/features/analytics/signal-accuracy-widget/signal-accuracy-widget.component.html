<mat-card>
  <mat-card-header>
    <mat-card-title>Signal Accuracy by Score</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    @if (buckets().length > 0) {
      <table mat-table [dataSource]="buckets()">
        <ng-container matColumnDef="range">
          <th mat-header-cell *matHeaderCellDef>Score Range</th>
          <td mat-cell *matCellDef="let row">{{ row.range }}</td>
        </ng-container>

        <ng-container matColumnDef="total">
          <th mat-header-cell *matHeaderCellDef>Signals</th>
          <td mat-cell *matCellDef="let row">{{ row.total }}</td>
        </ng-container>

        <ng-container matColumnDef="wins">
          <th mat-header-cell *matHeaderCellDef>Wins</th>
          <td mat-cell *matCellDef="let row">{{ row.wins }}</td>
        </ng-container>

        <ng-container matColumnDef="win_rate">
          <th mat-header-cell *matHeaderCellDef>Win Rate</th>
          <td mat-cell *matCellDef="let row">{{ row.win_rate | percent:'1.1-1' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    } @else {
      <p>No accuracy data yet. Signals need outcome data from closed trades.</p>
    }
  </mat-card-content>
</mat-card>
