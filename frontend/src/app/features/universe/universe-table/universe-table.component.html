<table mat-table [dataSource]="symbols()">
  <ng-container matColumnDef="ticker">
    <th mat-header-cell *matHeaderCellDef>Ticker</th>
    <td mat-cell *matCellDef="let row" class="ticker">{{ row.ticker }}</td>
  </ng-container>
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let row">{{ row.name }}</td>
  </ng-container>
  <ng-container matColumnDef="exchange">
    <th mat-header-cell *matHeaderCellDef>Exchange</th>
    <td mat-cell *matCellDef="let row">{{ row.exchange }}</td>
  </ng-container>
  <ng-container matColumnDef="last_price">
    <th mat-header-cell *matHeaderCellDef>Last Price</th>
    <td mat-cell *matCellDef="let row">{{ row.last_price | currency }}</td>
  </ng-container>
  <ng-container matColumnDef="avg_volume">
    <th mat-header-cell *matHeaderCellDef>Avg Volume</th>
    <td mat-cell *matCellDef="let row">{{ row.avg_volume | number }}</td>
  </ng-container>
  <ng-container matColumnDef="is_active">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let row">
      <app-status-badge
        [label]="row.is_active ? 'Active' : 'Inactive'"
        [color]="row.is_active ? 'green' : 'grey'"
      />
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
