<h2>Settings</h2>
<mat-card>
  <mat-card-header>
    <mat-card-title>System Information</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="info-row">
      <span>API Health</span>
      <app-status-badge
        [label]="healthy() ? 'Healthy' : 'Down'"
        [color]="healthy() ? 'green' : 'red'"
      />
    </div>
    @if (checkedAt()) {
      <div class="info-row">
        <span>Last Checked</span>
        <span class="timestamp">{{ checkedAt() | date:'medium' }}</span>
      </div>
    }
    <div class="info-row">
      <span>Trading Mode</span>
      <span>Paper</span>
    </div>
    <div class="info-row">
      <span>Version</span>
      <span>0.1.0</span>
    </div>
  </mat-card-content>
</mat-card>
<mat-card class="placeholder-card">
  <mat-card-header>
    <mat-card-title>Risk Parameters</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>Risk parameter configuration coming soon.</p>
  </mat-card-content>
</mat-card>
