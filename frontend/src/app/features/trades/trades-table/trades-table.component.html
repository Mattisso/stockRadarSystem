<table mat-table [dataSource]="trades()">
  <ng-container matColumnDef="ticker">
    <th mat-header-cell *matHeaderCellDef>Ticker</th>
    <td mat-cell *matCellDef="let row" class="ticker">{{ row.ticker }}</td>
  </ng-container>
  <ng-container matColumnDef="side">
    <th mat-header-cell *matHeaderCellDef>Side</th>
    <td mat-cell *matCellDef="let row">{{ row.side | uppercase }}</td>
  </ng-container>
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let row">
      <app-status-badge [label]="row.status" [color]="statusColor(row.status)" />
    </td>
  </ng-container>
  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>Qty</th>
    <td mat-cell *matCellDef="let row">{{ row.quantity }}</td>
  </ng-container>
  <ng-container matColumnDef="entry_price">
    <th mat-header-cell *matHeaderCellDef>Entry</th>
    <td mat-cell *matCellDef="let row">{{ row.entry_price | currency }}</td>
  </ng-container>
  <ng-container matColumnDef="exit_price">
    <th mat-header-cell *matHeaderCellDef>Exit</th>
    <td mat-cell *matCellDef="let row">{{ row.exit_price | currency }}</td>
  </ng-container>
  <ng-container matColumnDef="pnl">
    <th mat-header-cell *matHeaderCellDef>P&L</th>
    <td mat-cell *matCellDef="let row" [class]="row.pnl | pnlColor">
      {{ row.pnl | currency }}
    </td>
  </ng-container>
  <ng-container matColumnDef="signal_score">
    <th mat-header-cell *matHeaderCellDef>Score</th>
    <td mat-cell *matCellDef="let row">{{ row.signal_score | number:'1.2-2' }}</td>
  </ng-container>
  <ng-container matColumnDef="created_at">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let row">{{ row.created_at | date:'short' }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
