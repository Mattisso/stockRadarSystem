<mat-toolbar color="primary">
  <button mat-icon-button (click)="menuToggled.emit()" matTooltip="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="brand">Stock Radar</span>
  <span class="spacer"></span>
  <button mat-icon-button (click)="themeToggled.emit()" [matTooltip]="isDark() ? 'Light mode' : 'Dark mode'">
    <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
